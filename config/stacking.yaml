# 色块堆叠层位配置
# 取代手册 dofbot_color_stacking/garbage_grap.py arm_run() 里硬编码的
# 第 1~4 层 joints_down 数值，支持配置化的多层堆叠。
# 对应开发计划阶段三：「将堆叠目标位置配置化，避免硬编码散落在代码中」。

# 抓取->堆叠过程中的过渡姿态（手册 move() 中的 joints_00 / joints_up）
ready_pose:  [90, 135, 50, 50, 265, 30]   # joints_00 架起姿态(此处 j1=90 占位)
lift_pose:   [135, 80, 50, 50, 265, 30]    # joints_up 抬起姿态

# 夹爪
gripper:
  open: 0
  grasp: 100

# 每一层的放置关节角（堆叠区在 j1=135 方向）
# 数值来自手册 arm_run() 注释里的 a/b/c/d 及实际 joints_down。
# 层号越高，机械臂下压越浅（物体叠得越高），j2/j3/j4 递变。
layers:
  - level: 1
    joints_down: [135, 50, 20, 60, 265, 100]
  - level: 2
    joints_down: [135, 55, 38, 38, 265, 100]
  - level: 3
    joints_down: [135, 60, 45, 30, 265, 100]
  - level: 4
    joints_down: [135, 65, 55, 20, 265, 100]

# 最大堆叠层数（开发计划要求至少 3~4 层）
max_layers: 4
