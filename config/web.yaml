# 可视化系统配置
# 对应开发计划第7节：可视化电力库房管理系统。

server:
  host: "0.0.0.0"
  port: 8000

# 视频源
video:
  source: 0           # 摄像头索引（USB 摄像头通常为 0）；真机上由识别主程序提供帧
  width: 640
  height: 480
  fps: 15

# 数据存储（初期 JSON/CSV，后续可升级 SQLite，见开发计划 2.2）
storage:
  inventory_file: "web/backend/data/inventory.json"
  log_file: "web/backend/data/operation_log.csv"

# 是否使用 mock 数据（本机无真机时为 true，可在 PC 上演示整套 Web）
mock_mode: true

# 小米 MiMo 大模型 API（语音控制用，OpenAI 兼容）
# api_key 留空时优先读环境变量 MIMO_API_KEY；两者都没配则语音功能不可用。
# 申请地址：小米开放平台 platform.xiaomimimo.com
mimo:
  api_key: ""        # 填你自己的 key（sk-...），或用环境变量 MIMO_API_KEY
  base_url: "https://api.xiaomimimo.com/v1"
  asr_model: "mimo-v2.5-asr"
